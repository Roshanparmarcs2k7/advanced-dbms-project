<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Order Items</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>Order Items</h2>
    <a href="/order-items/add" class="btn btn-primary mb-3">+ Add Order Item</a>
    <table class="table table-bordered">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Order ID</th>
                <th>Product ID</th>
                <th>Quantity</th>
                <th>Price</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="orderItem : ${orderItems}">
                <td th:text="${orderItem.id}"></td>
                <td th:text="${orderItem.orderId}"></td>
                <td th:text="${orderItem.productId}"></td>
                <td th:text="${orderItem.quantity}"></td>
                <td th:text="${orderItem.price}"></td>
                <td>
                    <a th:href="@{/order-items/edit/{id}(id=${orderItem.id})}" class="btn btn-warning btn-sm">Edit</a>
                    <a th:href="@{/order-items/delete/{id}(id=${orderItem.id})}" class="btn btn-danger btn-sm"
                       onclick="return confirm('Delete karna chahte ho?')">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>
    <a href="/" class="btn btn-secondary">Back to Dashboard</a>
</div>
</body>
</html>
