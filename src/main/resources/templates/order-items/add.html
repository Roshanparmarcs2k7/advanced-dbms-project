<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Order Item</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>Add Order Item</h2>
    <form th:action="@{/order-items/add}" th:object="${orderItem}" method="post">
        <div class="mb-3">
            <label>Order ID</label>
            <input type="number" th:field="*{orderId}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Product ID</label>
            <input type="number" th:field="*{productId}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Quantity</label>
            <input type="number" th:field="*{quantity}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Price</label>
            <input type="number" step="0.01" th:field="*{price}" class="form-control">
        </div>
        <button type="submit" class="btn btn-success">Save</button>
        <a href="/order-items" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
