<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Invoices</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>Invoices</h2>
    <a href="/invoices/add" class="btn btn-primary mb-3">+ Add Invoice</a>
    <table class="table table-bordered">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Order ID</th>
                <th>Invoice Date</th>
                <th>Total</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="invoice : ${invoices}">
                <td th:text="${invoice.id}"></td>
                <td th:text="${invoice.orderId}"></td>
                <td th:text="${invoice.invoiceDate}"></td>
                <td th:text="${invoice.total}"></td>
                <td>
                    <a th:href="@{/invoices/edit/{id}(id=${invoice.id})}" class="btn btn-warning btn-sm">Edit</a>
                    <a th:href="@{/invoices/delete/{id}(id=${invoice.id})}" class="btn btn-danger btn-sm"
                       onclick="return confirm('Delete karna chahte ho?')">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>
    <a href="/" class="btn btn-secondary">Back to Dashboard</a>
</div>
</body>
</html>
