<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Invoice</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>Edit Invoice</h2>
    <form th:action="@{/invoices/edit/{id}(id=${invoice.id})}" th:object="${invoice}" method="post">
        <div class="mb-3">
            <label>Order ID</label>
            <input type="number" th:field="*{orderId}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Total</label>
            <input type="number" step="0.01" th:field="*{total}" class="form-control">
        </div>
        <button type="submit" class="btn btn-success">Update</button>
        <a href="/invoices" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
