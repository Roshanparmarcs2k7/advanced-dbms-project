<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Audit Log</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>Edit Audit Log</h2>
    <form th:action="@{/audit-log/edit/{id}(id=${auditLog.id})}" th:object="${auditLog}" method="post">
        <div class="mb-3">
            <label>User ID</label>
            <input type="number" th:field="*{userId}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Action</label>
            <input type="text" th:field="*{action}" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-success">Update</button>
        <a href="/audit-log" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
