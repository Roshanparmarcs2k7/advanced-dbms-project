<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Audit Log</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>Audit Log</h2>
    <a href="/audit-log/add" class="btn btn-primary mb-3">+ Add Log</a>
    <table class="table table-bordered">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>User ID</th>
                <th>Action</th>
                <th>Timestamp</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="auditLog : ${auditLogs}">
                <td th:text="${auditLog.id}"></td>
                <td th:text="${auditLog.userId}"></td>
                <td th:text="${auditLog.action}"></td>
                <td th:text="${auditLog.timestamp}"></td>
                <td>
                    <a th:href="@{/audit-log/edit/{id}(id=${auditLog.id})}" class="btn btn-warning btn-sm">Edit</a>
                    <a th:href="@{/audit-log/delete/{id}(id=${auditLog.id})}" class="btn btn-danger btn-sm"
                       onclick="return confirm('Delete karna chahte ho?')">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>
    <a href="/" class="btn btn-secondary">Back to Dashboard</a>
</div>
</body>
</html>
