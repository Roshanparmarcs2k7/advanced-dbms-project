<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Stock</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>Add Stock</h2>
    <form th:action="@{/stock/add}" th:object="${stock}" method="post">
        <div class="mb-3">
            <label>Product ID</label>
            <input type="number" th:field="*{productId}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Warehouse ID</label>
            <input type="number" th:field="*{warehouseId}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Quantity</label>
            <input type="number" th:field="*{quantity}" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-success">Save</button>
        <a href="/stock" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
