<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Stock</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>Stock</h2>
    <a href="/stock/add" class="btn btn-primary mb-3">+ Add Stock</a>
    <table class="table table-bordered">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Product ID</th>
                <th>Warehouse ID</th>
                <th>Quantity</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="stock : ${stocks}">
                <td th:text="${stock.id}"></td>
                <td th:text="${stock.productId}"></td>
                <td th:text="${stock.warehouseId}"></td>
                <td th:text="${stock.quantity}"></td>
                <td>
                    <a th:href="@{/stock/edit/{id}(id=${stock.id})}" class="btn btn-warning btn-sm">Edit</a>
                    <a th:href="@{/stock/delete/{id}(id=${stock.id})}" class="btn btn-danger btn-sm"
                       onclick="return confirm('Delete karna chahte ho?')">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>
    <a href="/" class="btn btn-secondary">Back to Dashboard</a>
</div>
</body>
</html>
