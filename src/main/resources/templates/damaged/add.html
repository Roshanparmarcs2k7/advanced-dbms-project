<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Damaged Item</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f4f4f4; }
        .form-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 400px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .btn-submit { background: #2ecc71; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-cancel { background: #7f8c8d; color: white; text-decoration: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; display: inline-block; width: 100%; text-align: center; margin-top: 10px; box-sizing: border-box; }
        h2 { text-align: center; color: #333; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Report Damaged Item</h2>
        <form th:action="@{/damaged-items/save}" th:object="${damagedItem}" method="POST">
            
            <div class="form-group">
                <label>Product Name:</label>
                <input type="text" th:field="*{productName}" required placeholder="Enter product name..."/>
            </div>
            
            <div class="form-group">
                <label>Quantity:</label>
                <input type="number" th:field="*{quantity}" required min="1" placeholder="Enter quantity..."/>
            </div>
            
            <div class="form-group">
                <label>Reason of Damage:</label>
                <textarea th:field="*{reason}" rows="3" required placeholder="Why is it damaged?..."></textarea>
            </div>
            
            <div class="form-group">
                <label>Reported Date:</label>
                <input type="date" th:field="*{reportedDate}" required />
            </div>
            
            <button type="submit" class="btn-submit">💾 Save Item</button>
            <a href="/damaged-items" class="btn-cancel">Cancel</a>
        </form>
    </div>

</body>
</html>
