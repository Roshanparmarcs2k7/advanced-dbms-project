<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Payment</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>Edit Payment</h2>
    <form th:action="@{/payments/edit/{id}(id=${payment.id})}" th:object="${payment}" method="post">
        <div class="mb-3">
            <label>Order ID</label>
            <input type="number" th:field="*{orderId}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Amount</label>
            <input type="number" step="0.01" th:field="*{amount}" class="form-control">
        </div>
        <div class="mb-3">
            <label>Method</label>
            <select th:field="*{method}" class="form-control">
                <option value="CASH">CASH</option>
                <option value="CARD">CARD</option>
                <option value="ONLINE">ONLINE</option>
            </select>
        </div>
        <button type="submit" class="btn btn-success">Update</button>
        <a href="/payments" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
