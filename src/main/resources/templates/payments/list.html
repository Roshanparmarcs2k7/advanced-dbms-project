<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Payments</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>Payments</h2>
    <a href="/payments/add" class="btn btn-primary mb-3">+ Add Payment</a>
    <table class="table table-bordered">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Order ID</th>
                <th>Amount</th>
                <th>Payment Date</th>
                <th>Method</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="payment : ${payments}">
                <td th:text="${payment.id}"></td>
                <td th:text="${payment.orderId}"></td>
                <td th:text="${payment.amount}"></td>
                <td th:text="${payment.paymentDate}"></td>
                <td th:text="${payment.method}"></td>
                <td>
                    <a th:href="@{/payments/edit/{id}(id=${payment.id})}" class="btn btn-warning btn-sm">Edit</a>
                    <a th:href="@{/payments/delete/{id}(id=${payment.id})}" class="btn btn-danger btn-sm"
                       onclick="return confirm('Delete karna chahte ho?')">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>
    <a href="/" class="btn btn-secondary">Back to Dashboard</a>
</div>
</body>
</html>
