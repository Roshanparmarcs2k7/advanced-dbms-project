<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Purchases</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>Purchases</h2>
    <a href="/purchases/add" class="btn btn-primary mb-3">+ Add Purchase</a>
    <table class="table table-bordered">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Supplier ID</th>
                <th>Purchase Date</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="purchase : ${purchases}">
                <td th:text="${purchase.id}"></td>
                <td th:text="${purchase.supplierId}"></td>
                <td th:text="${purchase.purchaseDate}"></td>
                <td th:text="${purchase.status}"></td>
                <td>
                    <a th:href="@{/purchases/edit/{id}(id=${purchase.id})}" class="btn btn-warning btn-sm">Edit</a>
                    <a th:href="@{/purchases/delete/{id}(id=${purchase.id})}" class="btn btn-danger btn-sm"
                       onclick="return confirm('Delete karna chahte ho?')">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>
    <a href="/" class="btn btn-secondary">Back to Dashboard</a>
</div>
</body>
</html>
