<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Purchase</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

    <h2>Edit Purchase</h2>
    
    <form th:action="@{/purchases/update/{id}(id=${purchase.id})}" th:object="${purchase}" method="POST" class="col-md-6">
        
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Item Name:</label>
            <input type="text" th:field="*{itemName}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Quantity:</label>
            <input type="number" th:field="*{quantity}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Price:</label>
            <input type="number" step="0.01" th:field="*{price}" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-warning">Update Purchase</button>
        <a href="/purchases" class="btn btn-secondary">Cancel</a>
    </form>

</body>
</html>
